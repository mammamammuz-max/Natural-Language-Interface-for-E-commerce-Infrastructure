<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce ChatOps Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2874f0;
            --dark-bg: #f1f3f6;
            --chat-bg: #ffffff;
            --text-main: #212121;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #172337;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 80vh;
        }

        .chat-header {
            background: var(--primary-blue);
            color: white;
            padding: 15px 20px;
            font-weight: 600;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--primary-blue);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-msg {
            align-self: flex-start;
            background: #e0e0e0;
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        button {
            padding: 10px 25px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>ChatOps Panel</h3>
        <p style="font-size: 12px; color: #878787;">Ollama (Llama 3.2)</p>
        <div class="status-item">● Server: <span style="color: #4caf50;">Online</span></div>
        <div class="status-item">● Database: <span style="color: #4caf50;">Connected</span></div>
    </div>

    <div class="main-content">
        <div class="chat-container">
            <div class="chat-header">E-commerce Assistant v2.0</div>
            
            <div id="chat-box">
                <div class="msg bot-msg">Hello! I'm your ChatOps assistant. How can I help you?</div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type here and press Enter...">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // 1. LISTEN FOR ENTER KEY
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMsg();
            }
        });

        // 2. SEND MESSAGE LOGIC
        async function sendMsg() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const text = inputField.value;

            if (!text) return;

            // Display User Message
            chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
            inputField.value = ''; // Clear input immediately
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('http://127.0.0.1:5000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                // Display Bot Message
                chatBox.innerHTML += `<div class="msg bot-msg">${data.reply}</div>`;
                
                // Dashboard Redirection Logic
                if (data.reply.includes("SUCCESS_OPEN_FLIPKART") || data.reply.toLowerCase().includes("flipkart")) {
                    setTimeout(() => { window.location.href = 'flipkart.html'; }, 1000);
                }

                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.innerHTML += `<div class="msg bot-msg" style="color: red;">Connection Error.</div>`;
            }
        }
    </script>
</body>
</html>
